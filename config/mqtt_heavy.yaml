# Traffic Profile: MQTT Dominant
# Shows: QoS differences (0 vs 1 vs 2), high publish rate

global:
  duration: 300
  warmup: 20
  cooldown: 20

phases:
  - name: mqtt_qos0_heavy
    duration: 70
    description: "QoS 0, fire and forget. One packet per message. Fast, unreliable."
    protocols:
      mqtt:
        rate: 200           # 200 messages/sec
        payload_size: 64    # small sensor payloads
        qos_distribution:
          0: 100            # 100% QoS 0
          1: 0
          2: 0
        topics:
          - sensors/temperature
          - sensors/humidity
          - sensors/pressure
          - sensors/co2
          - actuators/fan
      http2:
        rate: 10            # minimal HTTP/2 in the background
      tcp:
        rate: 2

  - name: mqtt_qos2_comparison
    duration: 70
    description: "QoS 2, exactly once. Four packets per message. In Wireshark: 4x more traffic."
    protocols:
      mqtt:
        rate: 50            # 50 messages/sec but 200 packets/sec (4x QoS 2 handshake)
        payload_size: 64
        qos_distribution:
          0: 0
          1: 0
          2: 100            # 100% QoS 2
        topics:
          - control/critical
          - alarms/fire
          - alarms/flood
      http2:
        rate: 10
      tcp:
        rate: 2

  - name: mqtt_mixed
    duration: 70
    description: "Mixed QoS levels, as in a real IoT system"
    protocols:
      mqtt:
        rate: 100
        payload_size: 128
        qos_distribution:
          0: 50             # Sensor readings: QoS 0
          1: 30             # Status updates: QoS 1
          2: 20             # Critical commands: QoS 2
        topics:
          - sensors/temperature
          - sensors/humidity
          - status/device_001
          - control/actuator_001
          - alarms/critical
      http2:
        rate: 15
      quic:
        rate: 5

  - name: mqtt_burst
    duration: 45
    description: >
      periodic_burst sending pattern: publish rate alternates between a low
      base rate and a much higher burst_rate every burst_interval seconds -
      mimics a batch of IoT devices all reporting in at once.
    protocols:
      mqtt:
        payload_size: 96
        qos_distribution:
          0: 60
          1: 30
          2: 10
        pattern: periodic_burst
        burst_rate: 250
        burst_duration: 4
        burst_interval: 20
      http2:
        rate: 10

  - name: mqtt_ramp
    duration: 45
    description: >
      "ramping (linear increase over time)" sending pattern: publish rate
      climbs linearly from ramp_start_rate to ramp_end_rate over
      ramp_duration seconds, then holds - simulates a sensor fleet coming
      online gradually.
    protocols:
      mqtt:
        payload_size: 96
        qos_distribution:
          0: 70
          1: 20
          2: 10
        pattern: ramp
        ramp_start_rate: 5
        ramp_end_rate: 180
        ramp_duration: 40
      http2:
        rate: 10
